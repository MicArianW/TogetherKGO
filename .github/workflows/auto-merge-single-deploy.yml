name: Auto-Merge Pending Publish PRs (Single Deploy - Optimized)

on:
  schedule:
    # Monday, Wednesday, Friday at 10:35 AM EST (14:35 UTC)
    - cron: "35 14 * * 1,3,5"
  workflow_dispatch:

jobs:
  batch_merge_and_sync:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MEDIA_BRANCH: media-assets
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Gather PRs with label "decap-cms/pending_publish"
        id: gather
        run: |
          prs=$(gh pr list \
            --state open \
            --label "decap-cms/pending_publish" \
            --json number,headRefName \
            --jq '.[] | "\(.number):\(.headRefName)"' | paste -sd "," -)
          
          pr_count=$(gh pr list \
            --state open \
            --label "decap-cms/pending_publish" \
            --json number \
            --jq '. | length')
          
          echo "prs=$prs" >> $GITHUB_OUTPUT
          echo "pr_count=$pr_count" >> $GITHUB_OUTPUT
          
          if [ "$pr_count" -gt 0 ]; then
            echo "Found $pr_count pending PRs to merge"
          else
            echo "No pending PRs found"
          fi
      
      - name: Batch merge all PRs (Don't push yet)
        if: steps.gather.outputs.prs != ''
        id: merge
        run: |
          # Parse PR numbers and branch names
          IFS=',' read -ra pr_array <<< "${{ steps.gather.outputs.prs }}"
          
          pr_numbers=""
          merged_prs=""
          
          # Checkout main and pull latest
          git checkout main
          git pull origin main
          
          # Merge each PR branch locally (but DON'T push yet)
          for pr_info in "${pr_array[@]}"; do
            pr_number=$(echo "$pr_info" | cut -d':' -f1)
            branch_name=$(echo "$pr_info" | cut -d':' -f2)
            
            echo "Merging PR #$pr_number (branch: $branch_name)"
            
            # Skip workflow-changing PRs for safety
            changed_files=$(gh pr view "$pr_number" --json files --jq '.files[].path')
            if echo "$changed_files" | grep -q '^.github/workflows/'; then
              echo "Skipping PR #$pr_number - modifies workflows"
              continue
            fi
            
            # Fetch and merge the PR branch
            git fetch origin "$branch_name"
            if git merge "origin/$branch_name" --no-edit --no-ff; then
              echo "Merged PR #$pr_number"
              pr_numbers="$pr_numbers #$pr_number"
              merged_prs="$merged_prs $pr_number"
            else
              echo "Failed to merge PR #$pr_number"
            fi
          done
          
          echo "merged_prs=$merged_prs" >> $GITHUB_OUTPUT
          
          # Check if we have changes (but don't push yet)
          if git diff --quiet origin/main; then
            echo "No changes to merge"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Merged PRs:$pr_numbers (not pushed yet)"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Sync service listings to services.json
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const servicesPath = 'data/services.json';
          const servicesDir = 'data/services';

          let services = [];

          if (fs.existsSync(servicesPath)) {
            services = JSON.parse(fs.readFileSync(servicesPath, 'utf8'));
            console.log(`Loaded ${services.length} existing services`);
          }

          let maxId = 0;

          services.forEach(service => {
            const match = service.id?.match(/fb(\d+)/);
            if (match) {
              maxId = Math.max(maxId, parseInt(match[1]));
            }
          });

          console.log(`Highest existing ID: fb${maxId}`);

          const files = fs.readdirSync(servicesDir)
            .filter(file => file.endsWith('.json'));

          console.log(`Found ${files.length} service listing files`);

          files.forEach(file => {

            const filePath = path.join(servicesDir, file);

            const listing = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            if (!listing.organization || !listing.organization.name) {
            console.log(`Skipping ${file}: missing organization.name`);
            return;
          }

            let id = listing.organization.id;

            if (!id) {
              maxId++;
              id = `fb${maxId}`;
            }

            const existingIndex = services.findIndex(s =>
              listing.organization?.id
                ? s.id === listing.organization.id
                : s.name === listing.organization.name
            );

            const serviceObj = {
              id: id,
              name: listing.organization.name,
              type: listing.organization.type || '',
              address: listing.organization.address || '',
              location: {
                lat: listing.location?.lat || 0,
                lng: listing.location?.lng || 0
              },
              hours: listing.hours || {},
              phone: listing.organization.phone || '',
              description: listing.organization.description || '',
              tags: listing.organization.tags || [],
              email: listing.organization.email || '',
              website: listing.organization.website || '',
              languages_spoken: listing.organization.languages_spoken || '',
              accessibility_info: listing.organization.accessibility_info || '',
              documents_required: listing.organization.documents_required || '',
              fees: listing.organization.fees || '',
              eligibility: listing.requirements?.eligibility || '',
              additional_info: listing.additional_info || ''
            };

            if (existingIndex >= 0) {
              console.log(`Updating: ${listing.organization.name} (${id})`);
              services[existingIndex] = serviceObj;
            } else {
              console.log(`Adding: ${listing.organization.name} (${id})`);
              services.push(serviceObj);
            }

          });

          services.sort((a,b) => {
            const aNum = parseInt(a.id.replace('fb','')) || 0;
            const bNum = parseInt(b.id.replace('fb','')) || 0;
            return aNum - bNum;
          });

          fs.writeFileSync(servicesPath, JSON.stringify(services, null, 2));

          console.log(`✅ Updated services.json (${services.length} services)`);
          EOF

      - name: Sync post media from image branch
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          if git fetch origin "${MEDIA_BRANCH}" 2>/dev/null; then
            echo "Fetched ${MEDIA_BRANCH}"
          else
            echo "No ${MEDIA_BRANCH} branch found on origin"
            exit 0
          fi

          rm -rf .media-sync-tmp
          mkdir -p .media-sync-tmp/assets/images/posts

          if git ls-tree -d --name-only "origin/${MEDIA_BRANCH}" assets/images/posts | grep -q "assets/images/posts"; then
            git archive --format=tar "origin/${MEDIA_BRANCH}" assets/images/posts | tar -xf - -C .media-sync-tmp
          fi

          mkdir -p assets/images/posts
          rsync -a --delete .media-sync-tmp/assets/images/posts/ assets/images/posts/

      - name: Remove expired posts and orphaned media
        if: steps.merge.outputs.has_changes == 'true'
        run: node .github/workflows/cleanup-expired-posts.js
      
      - name: Sync resources to resources.json
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const resourcesPath = 'data/resources.json';
          const resourcesDir = 'data/resources';

          let resources = [];

          if (fs.existsSync(resourcesPath)) {
            resources = JSON.parse(fs.readFileSync(resourcesPath, 'utf8'));
            console.log(`Loaded ${resources.length} existing resources`);
          }

          let maxId = 0;

          resources.forEach(resource => {
            const match = resource.id?.match(/rs(\d+)/);
            if (match) {
              maxId = Math.max(maxId, parseInt(match[1]));
            }
          });

          console.log(`Highest existing ID: rs${maxId}`);

          if (!fs.existsSync(resourcesDir)) {
            console.log("data/resources directory does not exist");
            process.exit(0);
          }

          const files = fs.readdirSync(resourcesDir)
            .filter(file => file.endsWith('.json'));

          console.log(`Found ${files.length} resource files`);

          files.forEach(file => {
            const filePath = path.join(resourcesDir, file);
            const entry = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            if (!entry.resource || !entry.resource.title) {
              console.log(`Skipping ${file}: missing resource.title`);
              return;
            }

            let id = entry.resource.id;
            if (!id) {
              maxId++;
              id = `rs${maxId}`;
            }

            const existingIndex = resources.findIndex(r =>
              entry.resource?.id
                ? r.id === entry.resource.id
                : r.title === entry.resource.title
            );

            const resourceObj = {
              id: id,
              title: entry.resource.title,
              organization: entry.resource.organization || '',
              type: entry.resource.type || '',
              description: entry.resource.description || '',
              website: entry.resource.website || '',
              additional_link: entry.resource.additional_link || '',
              region_served: entry.coverage?.region_served || '',
              eligibility: entry.requirements?.eligibility || '',
              fees: entry.requirements?.fees || '',
              documents_required: entry.requirements?.documents_required || '',
              email: entry.contact?.email || '',
              phone: entry.contact?.phone || '',
              tags: entry.meta?.tags || [],
              additional_notes: entry.meta?.additional_notes || ''
            };

            if (existingIndex >= 0) {
              console.log(`Updating: ${resourceObj.title} (${id})`);
              resources[existingIndex] = resourceObj;
            } else {
              console.log(`Adding: ${resourceObj.title} (${id})`);
              resources.push(resourceObj);
            }
          });

          resources.sort((a,b) => {
            const aNum = parseInt((a.id || '').replace('rs','')) || 0;
            const bNum = parseInt((b.id || '').replace('rs','')) || 0;
            return aNum - bNum;
          });

          fs.writeFileSync(resourcesPath, JSON.stringify(resources, null, 2));

          console.log(`✅ Updated resources.json (${resources.length} resources)`);
          EOF
      
      - name: Push all changes in ONE commit (Single Deploy)
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          # Add synced content, resources, and media updates
          git add -A data/services.json data/resources.json data/posts assets/images/posts
          
          # Check if there are any changes to commit
          if git diff --cached --quiet; then
            echo "No synced content changes detected"
            # Just push the merged PRs
            git push origin main
            echo "Pushed merged PRs only"
          else
            # Commit synced data, resources, and media updates
            git commit -m "Auto-update: Sync approved content, resources, and media"
            # Push everything in one deployment
            git push origin main
            echo "Pushed merged PRs, synced JSON, and media in ONE deployment"
          fi
      
      - name: Close merged PRs
        if: steps.merge.outputs.merged_prs != ''
        run: |
          merged_prs="${{ steps.merge.outputs.merged_prs }}"
          
          for pr_number in $merged_prs; do
            echo "Closing PR #$pr_number"
            gh pr close "$pr_number" --comment "Auto-merged in batch deploy" || true
          done
      
      - name: Summary
        if: always()
        run: |
          echo "----------------------------------------"
          echo "WORKFLOW SUMMARY"
          echo "----------------------------------------"
          
          if [ "${{ steps.gather.outputs.pr_count }}" -eq 0 ]; then
            echo "No pending PRs found"
          else
            echo "PRs found: ${{ steps.gather.outputs.pr_count }}"
            
            if [ "${{ steps.merge.outputs.has_changes }}" == "true" ]; then
              echo "Merged and synced in ONE deployment"
              echo "Netlify building (1 build only)"
            else
              echo "No changes to deploy"
            fi
          fi
          
          echo "----------------------------------------"
      
      - name: No PRs to merge
        if: steps.gather.outputs.prs == ''
        run: |
          echo "No pending_publish PRs found to merge"
          echo "Checking if sync is needed anyway..."
      
      - name: Sync service listings even if no PRs (Fallback)
        if: steps.gather.outputs.prs == ''
        run: |
          echo "Running fallback sync to ensure services.json is up to date..."

          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const servicesPath = 'data/services.json';
          const servicesDir = 'data/services';

          let services = [];

          if (fs.existsSync(servicesPath)) {
            services = JSON.parse(fs.readFileSync(servicesPath, 'utf8'));
            console.log(`Loaded ${services.length} existing services`);
          }

          let maxId = 0;

          services.forEach(service => {
            const match = service.id?.match(/fb(\d+)/);
            if (match) {
              maxId = Math.max(maxId, parseInt(match[1]));
            }
          });

          console.log(`Highest existing ID: fb${maxId}`);

          if (!fs.existsSync(servicesDir)) {
            console.log("data/services directory does not exist");
            process.exit(0);
          }

          const files = fs.readdirSync(servicesDir)
            .filter(file => file.endsWith('.json'));

          console.log(`Found ${files.length} service listing files`);

          files.forEach(file => {

            const filePath = path.join(servicesDir, file);

            const listing = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            if (!listing.organization || !listing.organization.name) {
            console.log(`Skipping ${file}: missing organization.name`);
            return;
          }

            let id = listing.organization.id;
            if (!id) {
              maxId++;
              id = `fb${maxId}`;
            }

            const existingIndex = services.findIndex(s =>
              listing.organization?.id
                ? s.id === listing.organization.id
                : s.name === listing.organization.name
            );

            const serviceObj = {
              id: id,
              name: listing.organization.name,
              type: listing.organization.type || '',
              address: listing.organization.address || '',
              location: {
                lat: listing.location?.lat || 0,
                lng: listing.location?.lng || 0
              },
              hours: listing.hours || {},
              phone: listing.organization.phone || '',
              description: listing.organization.description || '',
              tags: listing.organization.tags || [],
              email: listing.organization.email || '',
              website: listing.organization.website || '',
              languages_spoken: listing.organization.languages_spoken || '',
              accessibility_info: listing.organization.accessibility_info || '',
              documents_required: listing.organization.documents_required || '',
              fees: listing.organization.fees || '',
              eligibility: listing.requirements?.eligibility || '',
              additional_info: listing.additional_info || ''
            };

            if (existingIndex >= 0) {
              console.log(`Updating: ${listing.organization.name} (${id})`);
              services[existingIndex] = serviceObj;
            } else {
              console.log(`Adding: ${listing.organization.name} (${id})`);
              services.push(serviceObj);
            }

          });

          services.sort((a,b) => {
            const aNum = parseInt(a.id.replace('fb','')) || 0;
            const bNum = parseInt(b.id.replace('fb','')) || 0;
            return aNum - bNum;
          });

          fs.writeFileSync(servicesPath, JSON.stringify(services, null, 2));

          console.log(`✅ Updated services.json (${services.length} services)`);
          EOF

      - name: Sync post media from image branch (Fallback)
        if: steps.gather.outputs.prs == ''
        run: |
          if git fetch origin "${MEDIA_BRANCH}" 2>/dev/null; then
            echo "Fetched ${MEDIA_BRANCH}"
          else
            echo "No ${MEDIA_BRANCH} branch found on origin"
            exit 0
          fi

          rm -rf .media-sync-tmp
          mkdir -p .media-sync-tmp/assets/images/posts

          if git ls-tree -d --name-only "origin/${MEDIA_BRANCH}" assets/images/posts | grep -q "assets/images/posts"; then
            git archive --format=tar "origin/${MEDIA_BRANCH}" assets/images/posts | tar -xf - -C .media-sync-tmp
          fi

          mkdir -p assets/images/posts
          rsync -a --delete .media-sync-tmp/assets/images/posts/ assets/images/posts/

      - name: Remove expired posts and orphaned media (Fallback)
        if: steps.gather.outputs.prs == ''
        run: node .github/workflows/cleanup-expired-posts.js
      
      - name: Commit fallback sync changes
        if: steps.gather.outputs.prs == ''
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add -A data/services.json data/posts assets/images/posts

          if git diff --cached --quiet; then
            echo "No fallback sync changes detected"
          else
            git commit -m "Fallback sync: Update services and media assets"
            git push origin main
            echo "Pushed fallback services and media update"
          fi
